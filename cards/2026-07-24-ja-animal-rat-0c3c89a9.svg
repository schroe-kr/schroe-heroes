  <text class="ja-summary" x="148" y="423" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">今日は人とのやり取りが弾み、思わぬ助けを受けやすい</text>
<text class="ja-summary" x="148" y="463" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">日ですよ。</text>
<text class="ja-summary" x="148" y="503" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">気になる連絡は先送りせず、ひと言添えて動いてみてく</text>
<text class="ja-summary" x="148" y="543" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">ださい。</text>
