<text class="ja-summary" x="148" y="503" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">相手の立場に立って考える余裕を持つことが、トラブル</text>
<text class="ja-summary" x="148" y="543" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">を未然に防ぐ秘訣です。</text>
