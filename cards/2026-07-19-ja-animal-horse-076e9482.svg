  <text class="display" x="106" y="402" fill="#C4A354" font-size="72" font-weight="700" opacity="0.18">“</text>
  <text class="ja-summary" x="148" y="423" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">自分自身と向き合う時間を持つことで、次の目標が明確</text>
<text class="ja-summary" x="148" y="463" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">に見えてくる日となります。</text>
<text class="ja-summary" x="148" y="503" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">過信は禁物ですが、自分のペースでコツコツと準備を進</text>
<text class="ja-summary" x="148" y="543" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">めるのがいいですね。</text>
  <rect data-row-key="year-1966" x="72" y="602" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-1966" x="112" y="632" fill="#C0637A" font-size="18" font-weight="800" text-anchor="start">1966年生</text><foreignObject data-role="detail-copy" x="112" y="640" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">無理をして外出するよりも、自宅でゆっくりと体を休めることが明日への活力になります。
昔のアルバムを眺めて思い出に浸るのも、心の洗濯になって良いでしょう。</div></foreignObject><rect data-row-key="year-1978" x="72" y="742" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-1978" x="112" y="772" fill="#B08A3C" font-size="18" font-weight="800" text-anchor="start">1978年生</text><foreignObject data-role="detail-copy" x="112" y="780" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">自分を甘やかす時間を作って、エステやマッサージで心身を癒やしてあげてください。
無理に周囲に合わせる必要はないので、自分の心の声に従って行動しましょう。</div></foreignObject><rect data-row-key="year-1990" x="72" y="882" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-1990" x="112" y="912" fill="#4C7A9E" font-size="18" font-weight="800" text-anchor="start">1990年生</text><foreignObject data-role="detail-copy" x="112" y="920" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">ヨガやストレッチを自宅で行い、体の歪みを整えることに集中するのがおすすめです。
栄養バランスを考えた手料理を作って、健康的な一日を過ごしてみてください。</div></foreignObject><rect data-row-key="year-2002" x="72" y="1022" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-2002" x="112" y="1052" fill="#4E9A78" font-size="18" font-weight="800" text-anchor="start">2002年生</text><foreignObject data-role="detail-copy" x="112" y="1060" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">将来への不安を感じたら、信頼できる年上の親戚や知人に相談してみると道が開けます。
静かな図書館で読書をして、知識を蓄える時間に充てるのが良い過ごし方です。</div></foreignObject><rect data-row-key="year-2014" x="72" y="1162" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-2014" x="112" y="1192" fill="#C0637A" font-size="18" font-weight="800" text-anchor="start">2014年生</text><foreignObject data-role="detail-copy" x="112" y="1200" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">無理な運動は避けて、家族と一緒に静かに過ごす時間を大切にしてください。
自分の持ち物をきれいに掃除したり、整理したりすると気持ちがスッキリします。</div></foreignObject>
