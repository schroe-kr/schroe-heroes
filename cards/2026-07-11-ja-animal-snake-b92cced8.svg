特にキッチン周りを綺麗にすると、健康運アップに繋がりますよ。</div></foreignObject><rect data-row-key="year-1977" x="72" y="742" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-1977" x="112" y="772" fill="#B08A3C" font-size="18" font-weight="800" text-anchor="start">1977年生</text><foreignObject data-role="detail-copy" x="112" y="780" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">読書を通じて新しい知識を得ることで、内面的な成長を実感できるでしょう。
