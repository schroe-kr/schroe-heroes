  <rect data-row-key="year-1969" x="72" y="602" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text data-role="detail-heading" data-row-key="year-1969" x="112" y="632" fill="#C0637A" font-size="18" font-weight="800" text-anchor="start">Born 1969</text><foreignObject data-role="detail-copy" x="112" y="640" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Pretendard Variable&#39;, Pretendard, &#39;Noto Sans JP&#39;, -apple-system, BlinkMacSystemFont, Apple SD Gothic Neo, Hiragino Sans, Segoe UI, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">Treating yourself to a spa day or a professional massage is highly recommended.
