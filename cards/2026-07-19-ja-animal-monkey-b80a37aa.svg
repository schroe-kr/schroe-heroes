  <text class="ja-summary" x="148" y="423" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">予期せぬ小さなトラブルが起きやすいので、何事も慎重</text>
<text class="ja-summary" x="148" y="463" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">に進めることが重要です。</text>
<text class="ja-summary" x="148" y="503" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">焦って結論を出そうとせず、今日はゆっくりと流れる時</text>
<text class="ja-summary" x="148" y="543" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">間を楽しんでみてください。</text>
  <rect data-row-key="year-1968" x="72" y="602" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-1968" x="112" y="632" fill="#C0637A" font-size="18" font-weight="800" text-anchor="start">1968年生</text><foreignObject data-role="detail-copy" x="112" y="640" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">体力の過信は禁物なので、疲れたと感じる前に休憩を挟むように心がけましょう。
無理なお出かけは控え、庭先で日光浴をしながらリラックスするのが正解です。</div></foreignObject><rect data-row-key="year-1980" x="72" y="742" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-1980" x="112" y="772" fill="#B08A3C" font-size="18" font-weight="800" text-anchor="start">1980年生</text><foreignObject data-role="detail-copy" x="112" y="780" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">金銭面での貸し借りはトラブルの元になるので、親しい間柄でも避けるのが賢明です。
自宅で本格的なコーヒーや紅茶を淹れて、香りを楽しむ贅沢な時間を過ごしてください。</div></foreignObject><rect data-row-key="year-1992" x="72" y="882" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-1992" x="112" y="912" fill="#4C7A9E" font-size="18" font-weight="800" text-anchor="start">1992年生</text><foreignObject data-role="detail-copy" x="112" y="920" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">他人のトラブルに巻き込まれやすい日なので、今日は聞き役に徹するのが良いでしょう。
スマホの電源を切って、自然の多い場所でリフレッシュすることをおすすめします。</div></foreignObject><rect data-row-key="year-2004" x="72" y="1022" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-2004" x="112" y="1052" fill="#4E9A78" font-size="18" font-weight="800" text-anchor="start">2004年生</text><foreignObject data-role="detail-copy" x="112" y="1060" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">予定がキャンセルになっても、それを自分のための自由な時間と捉えて楽しみましょう。
気になっていた資格の勉強を少しだけ進めてみると、意外と捗ります。</div></foreignObject><rect data-row-key="year-2016" x="72" y="1162" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-2016" x="112" y="1192" fill="#C0637A" font-size="18" font-weight="800" text-anchor="start">2016年生</text><foreignObject data-role="detail-copy" x="112" y="1200" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">おもちゃや道具の扱いに注意して、怪我のないように楽しく遊んでください。
家の中でできる新しい遊びを考えて、家族を驚かせてみるのもいいですね。</div></foreignObject>
