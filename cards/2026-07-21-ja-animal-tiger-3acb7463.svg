  <text class="ja-summary" x="148" y="423" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">少し感情が揺れやすい日ですが、冷静さを保てばトラブ</text>
<text class="ja-summary" x="148" y="463" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">ルは避けられます。</text>
<text class="ja-summary" x="148" y="503" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">大切な判断は今日一日保留にして、静かに状況を見守っ</text>
<text class="ja-summary" x="148" y="543" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">てみてください。</text>
