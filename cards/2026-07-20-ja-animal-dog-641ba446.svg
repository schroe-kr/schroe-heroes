  <text class="display" x="106" y="402" fill="#C4A354" font-size="72" font-weight="700" opacity="0.18">“</text>
  <text class="ja-summary" x="148" y="423" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">人間関係において、少しだけ注意深く行動することが求</text>
<text class="ja-summary" x="148" y="463" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">められる日です。</text>
<text class="ja-summary" x="148" y="503" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">誤解を招かないよう、大切なことは言葉でしっかり伝え</text>
<text class="ja-summary" x="148" y="543" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">るようにしてください。</text>
  <rect data-row-key="year-1970" x="72" y="602" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-1970" x="112" y="632" fill="#C0637A" font-size="18" font-weight="800" text-anchor="start">1970年生</text><foreignObject data-role="detail-copy" x="112" y="640" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">健康維持のために、軽い運動や食事の見直しを検討すべき時期です。
無理な目標は立てず、毎日続けられるような簡単なことから始めてみましょう。</div></foreignObject><rect data-row-key="year-1982" x="72" y="742" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-1982" x="112" y="772" fill="#B08A3C" font-size="18" font-weight="800" text-anchor="start">1982年生</text><foreignObject data-role="detail-copy" x="112" y="780" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">仕事で責任の所在をはっきりさせておくことが、トラブルを防ぐ鍵となります。
報告・連絡・相談を徹底し、周囲との情報の共有を密にしてください。</div></foreignObject><rect data-row-key="year-1994" x="72" y="882" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-1994" x="112" y="912" fill="#4C7A9E" font-size="18" font-weight="800" text-anchor="start">1994年生</text><foreignObject data-role="detail-copy" x="112" y="920" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">恋愛面で少し寂しさを感じるかもしれませんが、今は自分を磨く時です。 
外見だけでなく内面も磨く努力をすることで、次のチャンスが自然と訪れます。</div></foreignObject><rect data-row-key="year-2006" x="72" y="1022" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-2006" x="112" y="1052" fill="#4E9A78" font-size="18" font-weight="800" text-anchor="start">2006年生</text><foreignObject data-role="detail-copy" x="112" y="1060" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">友達とのトラブルを避けるために、SNSでの発言は慎重に行うべきです。
感情的になった時は一度スマホを置き、深呼吸をしてから考え直しましょう。</div></foreignObject><rect data-row-key="year-2018" x="72" y="1162" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-2018" x="112" y="1192" fill="#C0637A" font-size="18" font-weight="800" text-anchor="start">2018年生</text><foreignObject data-role="detail-copy" x="112" y="1200" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">忘れ物に注意が必要な日なので、寝る前に持ち物をしっかり確認してください。
お気に入りのキーホルダーを付けるなど、忘れ物を防ぐ工夫をすると良いですね。</div></foreignObject>
