<text class="ja-summary" x="148" y="463" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">ることでトラブルを回避できます。</text>
<text class="ja-summary" x="148" y="503" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">予定を詰め込みすぎず、ゆとりを持って行動することを</text>
<text class="ja-summary" x="148" y="543" fill="#2A3346" font-size="30" font-weight="400" text-anchor="start">常に意識してみてください。</text>
  <rect data-row-key="year-1963" x="72" y="602" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-1963" x="112" y="632" fill="#C0637A" font-size="18" font-weight="800" text-anchor="start">1963年生</text><foreignObject data-role="detail-copy" x="112" y="640" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">近隣トラブルを避けるため、騒音やマナーにはいつも以上に気を配るようにしましょう。
落ち着いたカフェでゆっくりとお茶を飲みながら、静かな時間を過ごすのがベストです。</div></foreignObject><rect data-row-key="year-1975" x="72" y="742" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-1975" x="112" y="772" fill="#B08A3C" font-size="18" font-weight="800" text-anchor="start">1975年生</text><foreignObject data-role="detail-copy" x="112" y="780" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">スマートフォンの使いすぎで目が疲れやすいので、デジタルデトックスを試してみてください。
アロマを焚いてリラックスしたり、半身浴をしたりして体を温めるのがいいですね。</div></foreignObject><rect data-row-key="year-1987" x="72" y="882" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-1987" x="112" y="912" fill="#4C7A9E" font-size="18" font-weight="800" text-anchor="start">1987年生</text><foreignObject data-role="detail-copy" x="112" y="920" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">衝動買いをして後悔する恐れがあるため、財布の紐をしっかり締めておきましょう。
自宅で映画のシリーズを一気に見るなど、インドアな楽しみ方を見つけてみてください。</div></foreignObject><rect data-row-key="year-1999" x="72" y="1022" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-1999" x="112" y="1052" fill="#4E9A78" font-size="18" font-weight="800" text-anchor="start">1999年生</text><foreignObject data-role="detail-copy" x="112" y="1060" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">友人との会話でつい余計な一言を言ってしまいそうなので、聞き役に徹するのが無難です。
自分の部屋の模様替えをして、気分を一新させることにエネルギーを使いましょう。</div></foreignObject><rect data-row-key="year-2011" x="72" y="1162" width="936" height="124" rx="14" fill="#ffffff" fill-opacity="0.66" stroke="#20293B" stroke-opacity="0.09" stroke-width="2" filter="url(#panelShadow)"/><text class="ja-sans" data-role="detail-heading" data-row-key="year-2011" x="112" y="1192" fill="#C0637A" font-size="18" font-weight="800" text-anchor="start">2011年生</text><foreignObject data-role="detail-copy" x="112" y="1200" width="856" height="78"><div xmlns="http://www.w3.org/1999/xhtml" class="ja-sans" style="width:100%;height:100%;display:flex;align-items:center;color:#303948;font-family:&#39;Hiragino Sans&#39;, &#39;Hiragino Kaku Gothic ProN&#39;, &#39;Yu Gothic&#39;, &#39;Noto Sans CJK JP&#39;, &#39;Noto Sans JP&#39;, sans-serif;font-size:18px;font-weight:450;line-height:23px;letter-spacing:0;white-space:normal;line-break:strict;word-break:normal;overflow-wrap:normal;overflow:hidden;">忘れ物をしやすい運気なので、遊びに行く前には持ち物をしっかり確認してください。
絵を描いたり日記を書いたりして、自分の気持ちを形にしてみると心が整います。</div></foreignObject>
